<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="记牌器" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231f6feb'/><text x='90' y='128' font-size='110' text-anchor='middle' fill='white' font-family='-apple-system,sans-serif' font-weight='800'>记</text></svg>" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231f6feb'/><text x='16' y='23' font-size='20' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='800'>记</text></svg>" />
<title>记牌器</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --red: #f85149;
    --amber: #d29922;
    --gold: #f1c34d;
    --green: #3fb950;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 8px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0 4px 8px;
    color: var(--muted); font-size: 12px;
  }
  .header .total { color: var(--text); font-weight: 700; font-size: 14px; }

  .tap-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform .05s, background .1s;
  }
  .btn:active {
    transform: scale(.94);
    background: #2d6a4f;
    border-color: var(--green);
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    align-items: center;
    gap: 4px;
  }
  .btn .rank { font-size: 32px; font-weight: 800; line-height: 1; text-align: center; white-space: nowrap; color: #79c0ff; }
  .btn .rank.narrow { font-size: 26px; }
  .btn .rank.cjk    { font-size: 18px; }
  .btn .remain {
    font-size: 20px; font-weight: 800; line-height: 1.1;
    margin-top: 6px; color: var(--text);
  }
  .btn .played { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .btn .played b { color: var(--text); font-size: 11px; }

  .btn.full     .remain { color: var(--gold); }
  .btn.three    .remain { color: var(--amber); }
  .btn.zero     .remain { color: var(--muted); opacity: .4; }
  .btn.over     .remain { color: var(--red); font-style: italic; }

  .pill {
    height: 32px;
    border-radius: 16px;
    font-size: 14px; line-height: 30px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid;
    font-weight: 700;
    padding: 0;
    width: 100%;
  }
  .pill.undo {
    background: rgba(248, 81, 73, 0.15);
    color: var(--red);
    border-color: rgba(248, 81, 73, 0.5);
  }
  .pill.undo:active { background: var(--red); color: #fff; }
  .pill.add {
    background: rgba(63, 185, 113, 0.18);
    color: var(--green);
    border-color: rgba(63, 185, 113, 0.5);
  }
  .pill.add:active { background: var(--green); color: #000; }

  @media (orientation: landscape) and (max-height: 500px) {
    body { padding: 6px; }
    .header { font-size: 11px; padding: 0 4px 6px; }
    .tap-grid { grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .btn { padding: 6px 4px 4px; border-radius: 10px; }
    .btn .rank { font-size: 22px; }
    .btn .rank.narrow { font-size: 18px; }
    .btn .rank.cjk    { font-size: 13px; }
    .btn .remain { font-size: 14px; margin-top: 4px; }
    .btn .played { font-size: 9px; margin-top: 1px; }
    .btn .played b { font-size: 10px; }
    .pill { height: 26px; font-size: 12px; line-height: 24px; border-radius: 13px; }
    .footer button { padding: 8px; font-size: 13px; }
    .hint { font-size: 10px; margin-top: 6px; }
  }

  .btn.unknown {
    border-style: dashed;
    border-color: var(--muted);
    background: #1a1f26;
  }
  .btn.unknown .rank { color: var(--muted); }

  .footer { display: flex; gap: 8px; margin-top: 10px; }
  .footer button {
    flex: 1; padding: 12px;
    background: #21262d; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .footer button.danger { color: var(--red); border-color: var(--red); }

  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <span>大字 = 剩余张数</span>
  <span class="total">总剩 <span id="total">54</span></span>
</div>
<div class="tap-grid" id="tapGrid"></div>
<div class="footer">
  <button id="reset" class="danger">新的一局</button>
</div>
<div class="hint">
  中间=出牌 · 右「补」=新增 · 左「↶」=撤销 · 「?」=未知牌
</div>
<div class="hint">
  遇到董承就投了吧
</div>
<div class="hint">
  © 来自上班上疯了的能工智人甲
</div>
<script>
(() => {
  const RANKS = [
    { r: '大王', max: 1 },
    { r: '小王', max: 1 },
    { r: '2',  max: 4 }, { r: 'A', max: 4 }, { r: 'K',  max: 4 },
    { r: 'Q',  max: 4 }, { r: 'J', max: 4 }, { r: '10', max: 4 },
    { r: '9',  max: 4 }, { r: '8', max: 4 }, { r: '7',  max: 4 },
    { r: '6',  max: 4 }, { r: '5', max: 4 }, { r: '4',  max: 4 },
    { r: '3',  max: 4 },
    { r: '?',  max: 0, unknown: true },
  ];
  const played = RANKS.map(() => 0);
  const extra  = RANKS.map(() => 0);
  const histPerRank = RANKS.map(() => []);
  const tapGrid = document.getElementById('tapGrid');

  function build() {
    tapGrid.innerHTML = '';
    RANKS.forEach((info, i) => {
      const b = document.createElement('div');
      b.className = 'btn' + (info.unknown ? ' unknown' : '');
      const sizeClass = /[\u4e00-\u9fa5]/.test(info.r) ? ' cjk'
                      : (info.r.length >= 2 ? ' narrow' : '');
      b.innerHTML = `
        <div class="btn-row">
          <button class="pill undo" data-act="undo" aria-label="撤销该点">↶</button>
          <div class="rank${sizeClass}">${info.r}</div>
          <button class="pill add"  data-act="add"  aria-label="补牌">补</button>
        </div>
        <div class="remain">${info.max}</div>
        <div class="played">已出 <b>0</b></div>
      `;
      const handle = (e) => {
        const act = e.target && e.target.dataset && e.target.dataset.act;
        if (act === 'undo') { undoLast(i); return; }
        if (act === 'add')  { addOne(i);   return; }
        playOne(i);
      };
      // touchend: 防止 iOS 双击放大，同时手动触发 action
      b.addEventListener('touchend', (e) => {
        e.preventDefault();
        handle(e);
      }, { passive: false });
      // click: 桌面鼠标用（手机上因 preventDefault 不会触发）
      b.addEventListener('click', handle);
      tapGrid.appendChild(b);
    });
    refresh();
  }
  function playOne(i) { played[i]++; histPerRank[i].push('play'); refresh(); }
  function addOne(i)  { extra[i]++;  histPerRank[i].push('add');  refresh(); }
  function undoLast(i) {
    if (histPerRank[i].length === 0) return;
    const last = histPerRank[i].pop();
    if (last === 'play') played[i]--;
    else if (last === 'add') extra[i]--;
    refresh();
  }
  function refresh() {
    let totalLeft = 0;
    RANKS.forEach((info, i) => {
      const effMax = info.max + extra[i];
      const left = effMax - played[i];
      totalLeft += left;
      const btn = tapGrid.children[i];
      btn.classList.remove('full','three','low','zero','over');
      if (info.unknown) {
        // 未知牌不染色
      } else if (info.max === 4) {
        if (left < 0)        btn.classList.add('over');
        else if (left >= 4)  btn.classList.add('full');
        else if (left === 3) btn.classList.add('three');
        else if (left === 0) btn.classList.add('zero');
      } else {
        if (left < 0)       btn.classList.add('over');
        else if (left === 0) btn.classList.add('zero');
        else                 btn.classList.add('full');
      }
      btn.querySelector('.remain').textContent = left;
      const denom = extra[i] > 0 ? `${info.max}+${extra[i]}` : `${info.max}`;
      btn.querySelector('.played').innerHTML = info.unknown
        ? `未知`
        : `已出 <b>${played[i]}</b>/${denom}`;
    });
    document.getElementById('total').textContent = totalLeft;
  }
  document.getElementById('reset').addEventListener('click', () => {
    if (!confirm('开始新的一局？将清空所有记录。')) return;
    played.forEach((_, i) => { played[i] = 0; extra[i] = 0; histPerRank[i].length = 0; });
    refresh();
  });
  build();
})();
</script>
</body>
</html>
